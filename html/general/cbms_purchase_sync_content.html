<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Purchase Register Sync Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            padding: 24px;
        }

        /* Breadcrumb */
        .ant-breadcrumb {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
            background: white;
            padding: 16px;
            border-radius: 2px;
        }

        .ant-breadcrumb a {
            color: #198cce;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .ant-breadcrumb a:hover {
            text-decoration: underline;
        }

        .ant-breadcrumb-separator {
            margin: 0 8px;
            color: rgba(0, 0, 0, 0.45);
        }

        .anticon {
            display: inline-flex;
            align-items: center;
        }

        .anticon svg {
            width: 1em;
            height: 1em;
            fill: currentColor;
        }

        /* Content Container */
        .content-container {
            background: white;
            padding: 24px;
            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }

        /* Form Section */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 0.5fr 0.5fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            margin-bottom: 8px;
            color: rgba(0, 0, 0, 0.85);
            font-size: 14px;
            font-weight: 500;
        }

        .form-label.required::before {
            content: '* ';
            color: #ff4d4f;
        }

        .form-control {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 2px;
            font-size: 14px;
            height: 40px;
        }

        .form-control:focus {
            border-color: #40a9ff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        /* Buttons */
        .btn-primary {
            background: #1890ff;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 14px;
            height: 40px;
            margin-top: 30px;
        }

        .btn-primary:hover {
            background: #40a9ff;
        }

        /* Title */
        .page-title {
            text-align: center;
            font-weight: bold;
            font-size: 24px;
            margin: 24px 0;
            color: rgba(0, 0, 0, 0.85);
        }

        /* Table */
        .ant-table-wrapper {
            margin-bottom: 24px;
        }

        .ant-table {
            width: 100%;
            border: 1px solid #f0f0f0;
        }

        .ant-table-container {
            overflow-x: auto;
        }

        .ant-table table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .ant-table-thead th {
            background: #fafafa;
            color: rgba(0, 0, 0, 0.85);
            font-weight: 500;
            text-align: left;
            padding: 12px 16px;
            border: 1px solid #f0f0f0;
            font-size: 14px;
            white-space: nowrap;
        }

        .ant-table-tbody td {
            padding: 12px 16px;
            border: 1px solid #f0f0f0;
            color: rgba(0, 0, 0, 0.85);
            font-size: 14px;
        }

        /* Empty State */
        .ant-table-placeholder {
            text-align: center;
            padding: 64px 0;
        }

        .ant-empty {
            display: inline-block;
        }

        .ant-empty-image {
            margin-bottom: 8px;
        }

        .ant-empty-description {
            color: rgba(0, 0, 0, 0.25);
        }

        /* Pagination */
        .pagination-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .ant-pagination {
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
        }

        .ant-pagination-total-text {
            margin-right: 16px;
            color: rgba(0, 0, 0, 0.85);
            font-size: 14px;
        }

        .ant-pagination-prev,
        .ant-pagination-next,
        .ant-pagination-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            line-height: 30px;
            border: 1px solid #d9d9d9;
            border-radius: 2px;
            background: white;
            cursor: pointer;
        }

        .ant-pagination-disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .ant-pagination-item-link {
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ant-pagination-disabled .ant-pagination-item-link {
            cursor: not-allowed;
        }
    </style>
    <script src="../../js/xlsx.full.min.js"></script>
    <script src="../../js/exceljs.min.js"></script>
</head>

        <!-- Title -->

        <!-- Table -->

            <div class="ant-table">
                <div class="ant-table-container">
                    <table>
                        <colgroup>
                            <col style="width: 70px;">
                            <col style="width: 98px;">
                            <col style="width: 98px;">
                            <col style="width: 98px;">
                            <col style="width: 98px;">

    <script>
        // Sample data for demonstration
        const sampleData = [
            { type: 'Purchase', invoiceDate: '2079/11/15', invoiceNo: 'PUR-001', sellerName: 'Mountain Suppliers Pvt Ltd', sellerPan: '123456789', totalSales: '150,000.00', exemptedSale: '0.00', taxableSale: '150,000.00', vat: '19,500.00', exportedSales: '0.00', syncDate: '2079/12/01' },
            { type: 'Purchase', invoiceDate: '2079/11/16', invoiceNo: 'PUR-002', sellerName: 'Valley Traders', sellerPan: '987654321', totalSales: '95,500.00', exemptedSale: '5,500.00', taxableSale: '90,000.00', vat: '11,700.00', exportedSales: '0.00', syncDate: '2079/12/01' },
            { type: 'Import', invoiceDate: '2079/11/17', invoiceNo: 'IMP-001', sellerName: 'Global Exporters Ltd', sellerPan: '456789123', totalSales: '280,000.00', exemptedSale: '0.00', taxableSale: '280,000.00', vat: '36,400.00', exportedSales: '0.00', syncDate: '2079/12/02' },
            { type: 'Purchase', invoiceDate: '2079/11/18', invoiceNo: 'PUR-003', sellerName: 'Local Vendors Co', sellerPan: '789456123', totalSales: '110,000.00', exemptedSale: '0.00', taxableSale: '110,000.00', vat: '14,300.00', exportedSales: '0.00', syncDate: '2079/12/02' },
            { type: 'Purchase', invoiceDate: '2079/11/19', invoiceNo: 'PUR-004', sellerName: 'Eastern Trading House', sellerPan: '321654987', totalSales: '175,000.00', exemptedSale: '5,000.00', taxableSale: '170,000.00', vat: '22,100.00', exportedSales: '0.00', syncDate: '2079/12/03' },
            { type: 'Purchase', invoiceDate: '2079/11/20', invoiceNo: 'PUR-005', sellerName: 'Western Goods Ltd', sellerPan: '654987321', totalSales: '62,500.00', exemptedSale: '0.00', taxableSale: '62,500.00', vat: '8,125.00', exportedSales: '0.00', syncDate: '2079/12/03' },
            { type: 'Import', invoiceDate: '2079/11/21', invoiceNo: 'IMP-002', sellerName: 'International Supplies', sellerPan: '147258369', totalSales: '195,000.00', exemptedSale: '0.00', taxableSale: '195,000.00', vat: '25,350.00', exportedSales: '0.00', syncDate: '2079/12/04' }
        ];

        function searchData() {
            const fiscalYear = document.getElementById('fiscalYear').value;
            const month = document.getElementById('month').value;
            
            if (!fiscalYear || !month) {
                alert('Please select both Fiscal Year and Month!');
                return;
            }
            
            // Populate table with sample data
            const tableBody = document.getElementById('tableBody');
            let html = '';
            
            sampleData.forEach(row => {
                html += `
                    <tr>
                        <td>${row.type}</td>
                        <td>${row.invoiceDate}</td>
                        <td>${row.invoiceNo}</td>
                        <td>${row.sellerName}</td>
                        <td>${row.sellerPan}</td>
                        <td style="text-align: right;">${row.totalSales}</td>
                        <td style="text-align: right;">${row.exemptedSale}</td>
                        <td style="text-align: right;">${row.taxableSale}</td>
                        <td style="text-align: right;">${row.vat}</td>
                        <td style="text-align: right;">${row.exportedSales}</td>
                        <td>${row.syncDate}</td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
            
            // Update pagination
            document.querySelector('.ant-pagination-total-text').textContent = `Total ${sampleData.length} items`;
            document.querySelector('.ant-pagination-item a').textContent = '1';
            
            // Enable pagination buttons
            const prevBtn = document.querySelector('.ant-pagination-prev');
            const nextBtn = document.querySelector('.ant-pagination-next');
            const pageItem = document.querySelector('.ant-pagination-item');
            
            prevBtn.classList.add('ant-pagination-disabled');
            nextBtn.classList.add('ant-pagination-disabled');
            pageItem.classList.remove('ant-pagination-disabled');
        }

        async function exportToExcel() {
            const fiscalYear = document.getElementById('fiscalYear').value;
            const month = document.getElementById('month').value;
            
            if (!fiscalYear || !month) {
                alert('Please select both Fiscal Year and Month before exporting!');
                return;
            }
            
            // Check if data is loaded
            const tableBody = document.getElementById('tableBody');
            if (tableBody.querySelector('.ant-table-placeholder')) {
                alert('Please search for data first before exporting!');
                return;
            }
            
            // Create Excel workbook using ExcelJS
            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('Nepali PB');
            
            // Row 1: Title
            const row1 = worksheet.getRow(1);
            row1.getCell(5).value = 'खरिद खाता';
            row1.getCell(5).font = { bold: true, size: 16 };
            row1.getCell(5).alignment = { horizontal: 'center', vertical: 'middle' };
            row1.height = 25;
            worksheet.mergeCells('E1:G1');
            
            // Row 2: Subtitle
            const row2 = worksheet.getRow(2);
            row2.getCell(4).value = '(नियम २३ को उपनियम (१) को खण्ड (झ) संग सम्बन्धित )';
            row2.getCell(4).alignment = { horizontal: 'center', vertical: 'middle' };
            row2.height = 20;
            worksheet.mergeCells('D2:L2');
            
            // Row 3: Empty
            worksheet.getRow(3).height = 15;
            
            // Row 4: Taxpayer details
            const row4 = worksheet.getRow(4);
            row4.getCell(4).value = 'करदाता दर्ता न (PAN) : ..................';
            row4.getCell(5).value = 'करदाताको नाम: .........................';
            row4.getCell(6).value = 'साल ........';
            row4.getCell(8).value = 'कर अवधि: .................';
            row4.height = 20;
            worksheet.mergeCells('F4:G4');
            worksheet.mergeCells('H4:L4');
            
            // Row 5: Group headers
            const row5 = worksheet.getRow(5);
            row5.height = 30;
            row5.getCell(1).value = 'बीजक / प्रज्ञापनपत्र नम्बर';
            row5.getCell(6).value = 'कर छुट हुने वस्तु वा सेवाको';
            row5.getCell(7).value = 'करयोग्य खरिद (पूँजीगत बाहेक)';
            row5.getCell(9).value = 'करयोग्य पूँजीगत खरिद (पूँजीगत बाहेक)';
            row5.getCell(11).value = 'पूँजीगत करयोग्य खरिद / पेशी';
            worksheet.mergeCells('A5:D5');  // बीजक / प्रज्ञापनपत्र नम्बर
            worksheet.mergeCells('G5:H5');  // करयोग्य खरिद
            worksheet.mergeCells('I5:J5');  // करयोग्य पूँजीगत खरिद
            worksheet.mergeCells('K5:L5');  // पूँजीगत करयोग्य खरिद
            
            // Style group headers
            ['A5', 'F5', 'G5', 'I5', 'K5'].forEach(cell => {
                const c = worksheet.getCell(cell);
                c.font = { bold: true };
                c.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9D9D9' } };
                c.border = {
                    top: { style: 'thin' },
                    left: { style: 'thin' },
                    bottom: { style: 'thin' },
                    right: { style: 'thin' }
                };
            });
            
            // Row 6: Column headers
            const row6 = worksheet.getRow(6);
            row6.height = 70;
            const headers = [
                'मिति',
                'बीजक नं.',
                'प्रज्ञापनपत्र नं.',
                'आपूर्तिकर्ताको नाम',
                'आपूर्तिकर्ताको स्थायी लेखा नम्बर',
                'जम्मा खरिद मूल्य (रु)',
                'कर छुट हुने वस्तु वा सेवाको खरिद / पेशी मूल्य (रु)',
                'मूल्य (रु)',
                'कर (रु)',
                'मूल्य (रु)',
                'कर (रु)',
                'मूल्य (रु)',
                'कर (रु)'
            ];
            
            headers.forEach((header, index) => {
                const cell = row6.getCell(index + 1);
                cell.value = header;
                cell.font = { bold: true };
                cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9D9D9' } };
                cell.border = {
                    top: { style: 'thin' },
                    left: { style: 'thin' },
                    bottom: { style: 'thin' },
                    right: { style: 'thin' }
                };
            });
            
            // Data rows (starting from row 7)
            sampleData.forEach((data, index) => {
                const rowNum = 7 + index;
                const row = worksheet.getRow(rowNum);
                const rowData = [
                    data.invoiceDate,     // मिति
                    data.invoiceNo,       // बीजक नं.
                    '',                   // प्रज्ञापनपत्र नं.
                    data.sellerName,      // आपूर्तिकर्ताको नाम
                    data.sellerPan,       // आपूर्तिकर्ताको PAN
                    data.totalSales,      // जम्मा खरिद मूल्य
                    data.exemptedSale,    // कर छुट खरिद
                    data.taxableSale,     // करयोग्य खरिद मूल्य
                    data.vat,             // कर
                    '0.00',               // पूँजीगत मूल्य
                    '0.00',               // पूँजीगत कर
                    '0.00',               // पूँजीगत खरिद मूल्य
                    '0.00'                // पूँजीगत खरिद कर
                ];
                
                rowData.forEach((value, colIndex) => {
                    const cell = row.getCell(colIndex + 1);
                    cell.value = value;
                    cell.alignment = { vertical: 'middle' };
                    cell.border = {
                        top: { style: 'thin' },
                        left: { style: 'thin' },
                        bottom: { style: 'thin' },
                        right: { style: 'thin' }
                    };
                });
            });
            
            // Set column widths
            worksheet.columns = [
                { width: 12 },  // A: मिति
                { width: 14 },  // B: बीजक नं.
                { width: 16 },  // C: प्रज्ञापनपत्र नं.
                { width: 28 },  // D: आपूर्तिकर्ताको नाम
                { width: 24 },  // E: आपूर्तिकर्ताको PAN
                { width: 18 },  // F: जम्मा खरिद मूल्य
                { width: 24 },  // G: कर छुट खरिद
                { width: 16 },  // H: करयोग्य मूल्य
                { width: 12 },  // I: कर
                { width: 16 },  // J: पूँजीगत मूल्य
                { width: 12 },  // K: पूँजीगत कर
                { width: 16 },  // L: पूँजीगत खरिद मूल्य
                { width: 12 }   // M: पूँजीगत खरिद कर
            ];
            
            // Generate filename and download
            const filename = `purchase-format_${fiscalYear.replace('/', '-')}_${month}.xlsx`;
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
