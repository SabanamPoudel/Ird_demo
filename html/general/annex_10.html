        // Load user data from session on page load

            const panNumber = sessionStorage.getItem('taxpayerPAN') || '610015263';
            const username = sessionStorage.getItem('taxpayerUsername') || 'आता विजनेश एकेडेमी प्रा.लि.';
            
            document.getElementById('panNumber').value = panNumber;
            document.getElementById('taxpayerName').value = username;
        });
        
        function closeAnnex10() {
            // Close the modal if opened from dashboard
            if (window.parent && window.parent.closeAnnex10Modal) {
                window.parent.closeAnnex10Modal();
            } else {
                window.location.href = 'taxpayer_dashboard.html';
            }
        }
        
        function searchVouchers() {
            console.log('Searching vouchers...');
            loadDemoData();
        }
        
        function resetSearch() {
            document.getElementById('taxpayerName').value = '';
            document.getElementById('voucherTableBody').innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 20px; color: #999;">No data available</td></tr>';
            document.getElementById('totalCredit').value = '0.00';
        }

            // Add worksheet to workbook

            // Generate filename
            const filename = `Annex_10_Vouchers_${selectedYear}_${panNumber}.xlsx`;
            
            // Save file
            XLSX.writeFile(wb, filename);
        }
