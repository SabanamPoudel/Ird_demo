    <script>
        // Download file function
        function downloadFile(type) {
            const fileMap = {
                'sales_format': 'sales-format.xlsx',
                'sales_sample': 'sales-sample.xlsx',
                'purchase_format': 'purchase-format.xlsx',
                'purchase_sample': 'purchase-sample.xlsx',
                'sales_return_format': 'sales-return-format.xlsx',
                'sales_return_sample': 'sales-return-format.xlsx', 
                'purchase_return_format': 'purchase-return-format.xlsx',
                'purchase_return_sample': 'purchase-return-format.xlsx'
            };

            const filename = fileMap[type];
            if (filename) {
                const link = document.createElement('a');
                link.href = '../../resources/downloads/' + filename;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                alert('File not found!');
            }
        }

        // Download file validator

            alert('File validator tool will be available soon.\n\nPlease use the format files to ensure your data is correctly structured.');
