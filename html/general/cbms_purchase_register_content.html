<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Register Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            padding: 24px;
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
            background: white;
            padding: 16px;
            border-radius: 2px;
        }

        .breadcrumb a {
            color: #198cce;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb-separator {
            margin: 0 8px;
            color: rgba(0, 0, 0, 0.45);
        }

        .breadcrumb svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Main Content */
        .content-container {
            background: white;
            padding: 24px;
            border-radius: 2px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03), 0 1px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px 0 rgba(0, 0, 0, 0.02);
        }

        /* Form */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 0.5fr 0.5fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.88);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .form-label.required::before {
            content: '* ';
            color: #ff4d4f;
        }

        .form-control {
            height: 40px;
            padding: 4px 11px;
            font-size: 14px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background-color: #ffffff;
            transition: all 0.2s;
            outline: none;
        }

        .form-control:hover {
            border-color: #4096ff;
        }

        .form-control:focus {
            border-color: #4096ff;
            box-shadow: 0 0 0 2px rgba(5, 145, 255, 0.1);
        }

        /* Buttons */
        .btn {
            height: 40px;
            padding: 4px 15px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
        }

        .btn-primary {
            background: #1890ff;
            color: white;
            border-color: #1890ff;
        }

        .btn-primary:hover {
            background: #40a9ff;
            border-color: #40a9ff;
        }

        .btn-primary:active {
            background: #096dd9;
            border-color: #096dd9;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            margin-top: 24px;
        }

        .ant-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .ant-table thead th {
            background: #fafafa;
            color: rgba(0, 0, 0, 0.88);
            font-weight: 600;
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .ant-table tbody td {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            color: rgba(0, 0, 0, 0.88);
        }

        .ant-table tbody tr:hover {
            background: #fafafa;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 64px 0;
        }

        .empty-state svg {
            width: 64px;
            height: 41px;
            margin-bottom: 8px;
            opacity: 0.4;
        }

        .empty-state-text {
            color: rgba(0, 0, 0, 0.25);
            font-size: 14px;
        }

        /* Pagination */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
        }

        .ant-pagination {
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
        }

        .ant-pagination-total-text {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.88);
        }

        .ant-pagination-prev,
        .ant-pagination-next,
        .ant-pagination-item {
            min-width: 32px;
            height: 32px;
            line-height: 30px;
            text-align: center;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ant-pagination-prev:hover,
        .ant-pagination-next:hover,
        .ant-pagination-item:hover {
            border-color: #4096ff;
            color: #4096ff;
        }

        .ant-pagination-disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }

        .ant-pagination-disabled:hover {
            border-color: #d9d9d9;
            color: inherit;
        }

        .ant-pagination-item a {
            color: rgba(0, 0, 0, 0.88);
            text-decoration: none;
            display: block;
        }
    </style>
</head>

        function searchData() {
            const fiscalYear = document.getElementById('fiscalYear').value;
            const month = document.getElementById('month').value;
            
            if (!fiscalYear || !month) {
                alert('Please select both Fiscal Year and Month!');
                return;
            }
            
            // Populate table with sample data
            const tableBody = document.getElementById('tableBody');
            let html = '';
            
            sampleData.forEach(row => {
                html += `
                    <tr>
                        <td>${row.sn}</td>
                        <td>${row.date}</td>
                        <td>${row.invoiceNo}</td>
                        <td>${row.declarationNo}</td>
                        <td>${row.sellerName}</td>
                        <td>${row.sellerPan}</td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
            
            // Update pagination
            document.querySelector('.ant-pagination-total-text').textContent = `Total ${sampleData.length} items`;
            document.querySelector('.ant-pagination-item a').textContent = '1';
            
            // Enable pagination buttons
            const prevBtn = document.querySelector('.ant-pagination-prev');
            const nextBtn = document.querySelector('.ant-pagination-next');
            const pageItem = document.querySelector('.ant-pagination-item');
            
            prevBtn.classList.add('ant-pagination-disabled');
            nextBtn.classList.add('ant-pagination-disabled');
            pageItem.classList.remove('ant-pagination-disabled');
        }

            // Set default values
            document.getElementById('fiscalYear').value = '2081/082';
            document.getElementById('month').value = 'Shrawan';
            // Auto-search to show data
            searchData();

                        cell.alignment = { horizontal: 'right', vertical: 'middle' };

            a.href = url;
            a.download = filename;
