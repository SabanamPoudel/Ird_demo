<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Return Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            padding: 24px;
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
            background: white;
            padding: 16px;
            border-radius: 2px;
        }

        .breadcrumb a {
            color: #198cce;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb-separator {
            margin: 0 8px;
            color: rgba(0, 0, 0, 0.45);
        }

        .breadcrumb svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Main Content */
        .content-container {
            background: white;
            padding: 24px;
            border-radius: 2px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03), 0 1px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px 0 rgba(0, 0, 0, 0.02);
        }

        /* Form */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 0.5fr 0.5fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.88);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .form-label.required::before {
            content: '* ';
            color: #ff4d4f;
        }

        .form-control {
            height: 40px;
            padding: 4px 11px;
            font-size: 14px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background-color: #ffffff;
            transition: all 0.2s;
            outline: none;
        }

        .form-control:hover {
            border-color: #4096ff;
        }

        .form-control:focus {
            border-color: #4096ff;
            box-shadow: 0 0 0 2px rgba(5, 145, 255, 0.1);
        }

        /* Buttons */
        .btn {
            height: 40px;
            padding: 4px 15px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
        }

        .btn-primary {
            background: #1890ff;
            color: white;
            border-color: #1890ff;
        }

        .btn-primary:hover {
            background: #40a9ff;
            border-color: #40a9ff;
        }

        .btn-primary:active {
            background: #096dd9;
            border-color: #096dd9;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            margin-top: 24px;
        }

        .ant-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .ant-table thead th {
            background: #fafafa;
            color: rgba(0, 0, 0, 0.88);
            font-weight: 600;
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .ant-table tbody td {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            color: rgba(0, 0, 0, 0.88);
        }

        .ant-table tbody tr:hover {
            background: #fafafa;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 64px 0;
        }

        .empty-state svg {
            width: 64px;
            height: 41px;
            margin-bottom: 8px;
            opacity: 0.4;
        }

        .empty-state-text {
            color: rgba(0, 0, 0, 0.25);
            font-size: 14px;
        }

        /* Pagination */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
        }

        .ant-pagination {
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
        }

        .ant-pagination-total-text {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.88);
        }

        .ant-pagination-prev,
        .ant-pagination-next,
        .ant-pagination-item {
            min-width: 32px;
            height: 32px;
            line-height: 30px;
            text-align: center;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ant-pagination-prev:hover,
        .ant-pagination-next:hover,
        .ant-pagination-item:hover {
            border-color: #4096ff;
            color: #4096ff;
        }

        .ant-pagination-disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }

        .ant-pagination-disabled:hover {
            border-color: #d9d9d9;
            color: inherit;
        }

        .ant-pagination-item a {
            color: rgba(0, 0, 0, 0.88);
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <a href="#" onclick="parent.loadInIframe('cbms_dashboard_content.html')">
            <svg viewBox="64 64 896 896" focusable="false" data-icon="home" width="1em" height="1em" fill="currentColor" aria-hidden="true">
                <path d="M946.5 505L560.1 118.8l-25.9-25.9a31.5 31.5 0 00-44.4 0L77.5 505a63.9 63.9 0 00-18.8 46c.4 35.2 29.7 63.3 64.9 63.3h42.5V940h691.8V614.3h43.4c17.1 0 33.2-6.7 45.3-18.8a63.6 63.6 0 0018.7-45.3c0-17-6.7-33.1-18.8-45.2zM568 868H456V664h112v204zm217.9-325.7V868H632V640c0-22.1-17.9-40-40-40H432c-22.1 0-40 17.9-40 40v228H238.1V542.3h-96l370-369.7 23.1 23.1L882 542.3h-96.1z"></path>
            </svg>
            Home
        </a>
        <span class="breadcrumb-separator">/</span>
        <span>Purchase Return Report</span>
    </div>

    <!-- Main Content -->
    <div class="content-container">
        <!-- Form -->
        <form onsubmit="event.preventDefault(); searchData();">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label required">Fiscal Year</label>
                    <select id="fiscalYear" class="form-control">
                        <option value="">Select Fiscal Year</option>
                        <option value="2082/083">2082/083</option>
                        <option value="2081/082">2081/082</option>
                        <option value="2080/081">2080/081</option>
                        <option value="2079/080">2079/080</option>
                        <option value="2078/079">2078/079</option>
                        <option value="2077/078">2077/078</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label required">Month</label>
                    <select id="month" class="form-control">
                        <option value="">Select Month</option>
                        <option value="Shrawan">Shrawan</option>
                        <option value="Bhadra">Bhadra</option>
                        <option value="Ashwin">Ashwin</option>
                        <option value="Kartik">Kartik</option>
                        <option value="Mangsir">Mangsir</option>
                        <option value="Poush">Poush</option>
                        <option value="Magh">Magh</option>
                        <option value="Falgun">Falgun</option>
                        <option value="Chaitra">Chaitra</option>
                        <option value="Baishak">Baishak</option>
                        <option value="Jestha">Jestha</option>
                        <option value="Ashar">Ashar</option>
                    </select>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
                <div class="form-group">
                    <button type="button" class="btn btn-primary" onclick="exportToExcel()">Export to Excel</button>
                </div>
            </div>
        </form>

        <!-- Title -->
        <h2 style="text-align: center; margin: 24px 0; font-size: 24px; font-weight: 600; color: rgba(0, 0, 0, 0.88);">
            Purchase Return Report
        </h2>

        <!-- Table -->
        <div class="table-container">
            <table class="ant-table">
                <thead>
                    <tr>
                        <th>S.N</th>
                        <th>Date</th>
                        <th>Invoice No.</th>
                        <th>Seller Name</th>
                        <th>Seller PAN</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <svg viewBox="64 64 896 896" focusable="false">
                                    <path d="M304 176h80v48h-80zm168 0h80v48h-80zm-336 0h80v48h-80zm584 0h80v48h-80zM184 432h-80v48h80zm0 120h-80v48h80zm0-240h-80v48h80zm0 360h-80v48h80zm0 120h-80v48h80zm640-480h80v48h-80zm0 120h80v48h-80zm0 120h80v48h-80zm0 120h80v48h-80zm0 120h80v48h-80zm-480-48h80v48h-80zm168 0h80v48h-80zm-168-120h80v48h-80zm168 0h80v48h-80zm-168-120h80v48h-80zm168 0h80v48h-80z" opacity="0.3" fill="#e0e0e0"></path>
                                    <path d="M880 112H144c-17.7 0-32 14.3-32 32v736c0 17.7 14.3 32 32 32h736c17.7 0 32-14.3 32-32V144c0-17.7-14.3-32-32-32zm-40 728H184V184h656v656z" fill="#bfbfbf"></path>
                                </svg>
                                <div class="empty-state-text">No Data</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination-container">
            <div class="ant-pagination-total-text">Total 0 items</div>
            <ul class="ant-pagination">
                <li class="ant-pagination-prev ant-pagination-disabled">
                    <svg viewBox="64 64 896 896" focusable="false" width="12" height="12" fill="currentColor">
                        <path d="M724 218.3V141c0-6.7-7.7-10.4-12.9-6.3L260.3 486.8a31.86 31.86 0 000 50.3l450.8 352.1c5.3 4.1 12.9.4 12.9-6.3v-77.3c0-4.9-2.3-9.6-6.1-12.6l-360-281 360-281.1c3.8-3 6.1-7.7 6.1-12.6z"></path>
                    </svg>
                </li>
                <li class="ant-pagination-item ant-pagination-disabled">
                    <a>0</a>
                </li>
                <li class="ant-pagination-next ant-pagination-disabled">
                    <svg viewBox="64 64 896 896" focusable="false" width="12" height="12" fill="currentColor">
                        <path d="M765.7 486.8L314.9 134.7A7.97 7.97 0 00302 141v77.3c0 4.9 2.3 9.6 6.1 12.6l360 281.1-360 281.1c-3.9 3-6.1 7.7-6.1 12.6V883c0 6.7 7.7 10.4 12.9 6.3l450.8-352.1a31.96 31.96 0 000-50.4z"></path>
                    </svg>
                </li>
            </ul>
        </div>
    </div>

    <script src="../../js/exceljs.min.js"></script>
    <script>
        // Sample data for demonstration
        const sampleData = [
            { sn: 1, date: '2081.05.05', invoiceNo: 'PRET-001', sellerName: 'ABC Suppliers Pvt. Ltd.', sellerPan: '123456789' },
            { sn: 2, date: '2081.05.06', invoiceNo: 'PRET-002', sellerName: 'XYZ Trading', sellerPan: '987654321' },
            { sn: 3, date: '2081.05.07', invoiceNo: 'PRET-003', sellerName: 'Nepal Distributors', sellerPan: '456789123' }
        ];

        function searchData() {
            const fiscalYear = document.getElementById('fiscalYear').value;
            const month = document.getElementById('month').value;
            
            if (!fiscalYear || !month) {
                alert('Please select both Fiscal Year and Month!');
                return;
            }
            
            // Populate table with sample data
            const tableBody = document.getElementById('tableBody');
            let html = '';
            
            sampleData.forEach(row => {
                html += `
                    <tr>
                        <td>${row.sn}</td>
                        <td>${row.date}</td>
                        <td>${row.invoiceNo}</td>
                        <td>${row.sellerName}</td>
                        <td>${row.sellerPan}</td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
            
            // Update pagination
            document.querySelector('.ant-pagination-total-text').textContent = `Total ${sampleData.length} items`;
            document.querySelector('.ant-pagination-item a').textContent = '1';
            
            // Enable pagination buttons
            const prevBtn = document.querySelector('.ant-pagination-prev');
            const nextBtn = document.querySelector('.ant-pagination-next');
            const pageItem = document.querySelector('.ant-pagination-item');
            
            prevBtn.classList.add('ant-pagination-disabled');
            nextBtn.classList.add('ant-pagination-disabled');
            pageItem.classList.remove('ant-pagination-disabled');
        }

        async function exportToExcel() {
            const fiscalYear = document.getElementById('fiscalYear').value;
            const month = document.getElementById('month').value;
            
            if (!fiscalYear || !month) {
                alert('Please select both Fiscal Year and Month to export!');
                return;
            }

            // Create workbook
            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('Purchase Return');

            // Add headers
            worksheet.addRow(['S.N', 'Date', 'Invoice No.', 'Seller Name', 'Seller PAN']);
            
            // Style header row
            const headerRow = worksheet.getRow(1);
            headerRow.font = { bold: true };
            headerRow.fill = {
                type: 'pattern',
                pattern: 'solid',
                fgColor: { argb: 'FFD3D3D3' }
            };
            
            // Add borders to header
            headerRow.eachCell((cell) => {
                cell.border = {
                    top: { style: 'thin' },
                    left: { style: 'thin' },
                    bottom: { style: 'thin' },
                    right: { style: 'thin' }
                };
            });

            // Add data rows
            sampleData.forEach(row => {
                const dataRow = worksheet.addRow([
                    row.sn,
                    row.date,
                    row.invoiceNo,
                    row.sellerName,
                    row.sellerPan
                ]);
                
                // Add borders to data cells
                dataRow.eachCell((cell) => {
                    cell.border = {
                        top: { style: 'thin' },
                        left: { style: 'thin' },
                        bottom: { style: 'thin' },
                        right: { style: 'thin' }
                    };
                });
            });

            // Set column widths
            worksheet.columns = [
                { width: 8 },   // S.N
                { width: 14 },  // Date
                { width: 16 },  // Invoice No.
                { width: 30 },  // Seller Name
                { width: 16 }   // Seller PAN
            ];
            
            // Generate filename and download
            const filename = `purchase-return_${fiscalYear.replace('/', '-')}_${month}.xlsx`;
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
